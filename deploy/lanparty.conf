# /etc/nginx/sites-available/lanparty.conf
# Modern, hardened NGINX config for the LAN Party Flask app.
# nginx serves static assets directly; /api is proxied to gunicorn over a unix socket.
#
# Replace REPLACE_WITH_DOMAIN and the TLS cert paths before enabling.
# Adjust /srv/lanparty to wherever you deploy (see INSTALL.md).

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name REPLACE_WITH_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name REPLACE_WITH_DOMAIN;

    # --- TLS (use certbot / your CA to populate these) ---
    ssl_certificate     /etc/letsencrypt/live/REPLACE_WITH_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/REPLACE_WITH_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'" always;

    # Hide nginx version.
    server_tokens off;

    # Reasonable upload cap for a small app.
    client_max_body_size 2m;

    # Document root = repo's static/ directory.
    root /srv/lanparty/static;
    index index.html;

    # --- Static files served directly by nginx ---
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location /static/ {
        alias /srv/lanparty/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- API proxied to gunicorn ---
    location /api/ {
        proxy_pass http://unix:/run/lanparty/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Don't serve dotfiles or the sqlite db.
    location ~ /\. { deny all; }
}
