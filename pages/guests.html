<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guests — SUDOBASH '26</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'base': '#121212', 'surface': '#1E1E1E', 'border-c': '#333333',
            'text-primary': '#E0E0E0', 'text-muted': '#8A8A8A',
            'accent-orange': '#E95420', 'accent-blue': '#1793D1', 'accent-green': '#87A556',
          },
          fontFamily: {
            'ubuntu': ['Ubuntu', 'sans-serif'],
            'roboto': ['Roboto', 'DejaVu Sans', 'sans-serif'],
            'mono': ['Fira Code', 'Liberation Mono', 'monospace'],
          },
          borderRadius: { 'kit': '2px' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/line-awesome/1.3.0/line-awesome/css/line-awesome.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-base text-text-primary min-h-screen flex flex-col">

  <nav-bar current-page="guests"></nav-bar>

  <div id="login-modal" class="modal-overlay hidden">
    <div class="modal-panel">
      <h2 class="font-ubuntu text-lg mb-4">Login</h2>
      <form id="login-form">
        <div class="mb-3"><label class="block text-sm text-text-muted mb-1">Name</label><input type="text" name="name" required autocomplete="name"></div>
        <div class="mb-4"><label class="block text-sm text-text-muted mb-1">Access Code</label><input type="text" name="access_code" required maxlength="7" autocomplete="off" class="font-mono tracking-widest uppercase"></div>
        <div id="login-error" class="text-accent-orange text-sm mb-3 hidden"></div>
        <div class="flex gap-3">
          <button type="submit" class="btn btn-primary flex-1">LOGIN</button>
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('login-modal').classList.add('hidden')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="prefs-modal" class="modal-overlay hidden">
    <div class="modal-panel max-w-lg">
      <h2 class="font-ubuntu text-lg mb-4">Your Preferences</h2>
      <form id="prefs-form">
        <div class="mb-3"><label class="block text-sm text-text-muted mb-1">Handle</label><input type="text" name="handle" placeholder="Your display name"></div>
        <div class="mb-3"><label class="block text-sm text-text-muted mb-1">Avatar</label><div id="avatar-picker" class="grid grid-cols-6 gap-2"></div><input type="hidden" name="avatar"></div>
        <div class="mb-3"><label class="block text-sm text-text-muted mb-1">Operating System</label><input type="text" name="os" placeholder="e.g. Arch btw"></div>
        <div class="mb-3"><label class="block text-sm text-text-muted mb-1">Days Attending</label><div class="flex gap-4"><label class="flex items-center gap-2"><input type="radio" name="days_attending" value="saturday"> Saturday</label><label class="flex items-center gap-2"><input type="radio" name="days_attending" value="sunday"> Sunday</label><label class="flex items-center gap-2"><input type="radio" name="days_attending" value="both"> Both</label></div></div>
        <div class="mb-3"><label class="block text-sm text-text-muted mb-1">Skill Level</label><select name="skill_level"><option value="">-- Select --</option><option value="casual">Casual</option><option value="intermediate">Intermediate</option><option value="competitive">Competitive</option></select></div>
        <div class="mb-4"><label class="block text-sm text-text-muted mb-1">Snack Contribution</label><input type="text" name="snack_contribution" placeholder="Bringing any snacks?"></div>
        <div class="flex gap-3"><button type="submit" class="btn btn-primary flex-1">Save</button><button type="button" class="btn btn-secondary" onclick="document.getElementById('prefs-modal').classList.add('hidden')">Cancel</button></div>
      </form>
    </div>
  </div>

  <main class="flex-1">
    <section class="py-10">
      <div class="max-w-3xl mx-auto px-4">
        <h1 class="font-ubuntu text-3xl font-bold mb-8">
          <i class="las la-users text-accent-blue"></i> Guest List
        </h1>
        <div id="guest-list"></div>
      </div>
    </section>
  </main>

  <footer class="border-t border-border-c bg-surface py-6 mt-auto">
    <div class="max-w-7xl mx-auto px-4 flex justify-between text-text-muted text-sm font-mono">
      <span>SUDOBASH '26 — LAN Party</span>
      <span>Contact: sergio@example.com</span>
    </div>
  </footer>

  <script type="module" src="/static/js/nav.mjs"></script>
  <script type="module" src="/static/js/app.mjs"></script>
  <script type="module">
    import { initGuestList } from '/static/js/guests.mjs';
    document.addEventListener('DOMContentLoaded', () => { initGuestList(); });
  </script>
</body>
</html>
